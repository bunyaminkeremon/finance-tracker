<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>Finance Tracker</h1>

        <div class="summary">
            <div class="summary-card">
                <span class="summary-label">Balance</span>
                <span class="summary-amount" id="balance">$0.00</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Income</span>
                <span class="summary-amount income" id="totalIncome">$0.00</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Expenses</span>
                <span class="summary-amount expense" id="totalExpense">$0.00</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="chart" height="200"></canvas>
        </div>

        <div class="controls">
            <div class="filters">
                <select id="filterType">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <select id="filterCategory">
                    <option value="all">All Categories</option>
                </select>
                <select id="filterMonth">
                    <option value="all">All Time</option>
                </select>
            </div>
            <button class="add-btn" id="addBtn">+ Add</button>
        </div>

        <div class="transactions" id="transactions"></div>
        <p class="empty" id="emptyState">No transactions yet.</p>

        <div class="overlay" id="overlay">
            <div class="dialog">
                <div class="dialog-top">
                    <h2 id="dialogTitle">Add Transaction</h2>
                    <button class="x-btn" id="closeDialog">&times;</button>
                </div>
                <div class="type-toggle">
                    <button class="type-btn active" id="typeIncome" data-type="income">Income</button>
                    <button class="type-btn" id="typeExpense" data-type="expense">Expense</button>
                </div>
                <label>Description</label>
                <input type="text" id="tDesc" placeholder="What was it for?">
                <label>Amount ($)</label>
                <input type="number" id="tAmount" placeholder="0.00" min="0" step="0.01">
                <label>Category</label>
                <select id="tCategory">
                    <option value="Salary">Salary</option>
                    <option value="Freelance">Freelance</option>
                    <option value="Investment">Investment</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
                <label>Date</label>
                <input type="date" id="tDate">
                <button class="save-btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
